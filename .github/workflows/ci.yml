name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Typecheck, test, build, and release QA
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Package extension
        run: pnpm package:extension

      - name: Public repo safety QA
        run: pnpm qa:public-repo

      - name: Public docs sync QA
        run: pnpm qa:public-docs

      - name: WebLLM model policy QA
        run: pnpm qa:webllm-model-policy

      - name: Dependency policy QA
        run: pnpm qa:dependency-policy

      - name: Release policy QA
        run: pnpm qa:release-policy

      - name: Extension size budget QA
        run: pnpm qa:extension:size

      - name: Manifest QA
        run: pnpm qa:extension:manifest

      - name: Chrome Web Store QA
        run: pnpm qa:chrome-store
